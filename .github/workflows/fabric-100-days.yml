# Microsoft Fabric 100 Days — daily publish + LinkedIn
# Schedule: 9:00 AM India Standard Time (IST = UTC+5:30 → 03:30 UTC)
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   LINKEDIN_ACCESS_TOKEN   — w_member_social (post); r_liteprofile optional for preflight
#   LINKEDIN_PERSON_ID      — urn person id (digits only in secret value)
#   ANTHROPIC_API_KEY       — strongly recommended: otherwise articles use the template stub
#
# Optional repository secrets:
#   ANTHROPIC_MODEL         — e.g. claude-sonnet-4-20250514 (default in script)
#   WEBSITE_URL             — override public base URL for links
#
# Optional repository variables (Settings → Variables):
#   LINKEDIN_SKIP_CONNECTION_TEST — true if token only has posting scope
#   LINKEDIN_OPTIONAL      — true to not fail the workflow if LinkedIn post fails (article still publishes)
#
# GITHUB_TOKEN is provided automatically; needs contents: write (see permissions below).
#
# Place at repo root next to this workflow: full_automation_system.py,
# enhanced_fabric_schedule.json, and requirements.txt.

name: Fabric 100 Days — daily publish

on:
  schedule:
    - cron: '30 3 * * *' # 03:30 UTC = 09:00 IST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fabric-100-days-daily
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Use Node.js 24 for actions/checkout, setup-python, etc. (avoids Node 20 deprecation warnings)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily automation (single cycle)
        env:
          GITHUB_ACTIONS: 'true'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_REPOSITORY is set automatically by Actions (owner/repo)
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          # Set to true only if you want Claude to write articles instead of schedule-based copy
          FABRIC_USE_AI: ${{ vars.FABRIC_USE_AI }}
          # Optional: override public article URLs (e.g. project pages site)
          WEBSITE_URL: ${{ secrets.WEBSITE_URL }}
          # Optional repo variable: set to true if preflight fails but posting works (w_member_social-only tokens)
          LINKEDIN_SKIP_CONNECTION_TEST: ${{ vars.LINKEDIN_SKIP_CONNECTION_TEST }}
          LINKEDIN_OPTIONAL: ${{ vars.LINKEDIN_OPTIONAL }}
        run: python full_automation_system.py --once
