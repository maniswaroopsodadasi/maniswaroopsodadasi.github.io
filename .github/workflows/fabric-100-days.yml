# Microsoft Fabric 100 Days — daily publish + LinkedIn + YouTube
# Schedule: 7:00 AM India Standard Time (IST = UTC+5:30 → 01:30 UTC)
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   LINKEDIN_ACCESS_TOKEN   — OAuth token with w_member_social + openid + profile scopes
#   LINKEDIN_AUTHOR_URN     — urn:li:person:<your-oidc-sub>  (e.g. urn:li:person:botDMcOL-E)
#   LINKEDIN_PERSON_ID      — same OIDC sub value without urn prefix (e.g. botDMcOL-E)
#   ANTHROPIC_API_KEY       — strongly recommended: otherwise articles use the template stub
#
# YouTube secrets (optional — set both to enable YouTube uploads):
#   YOUTUBE_CLIENT_SECRET_B64  — base64-encoded youtube_client_secret.json
#                                 run: base64 -w0 youtube_client_secret.json
#   YOUTUBE_REFRESH_TOKEN      — OAuth2 refresh token (run youtube_oauth_setup.py once locally)
#
# Optional repository secrets:
#   ANTHROPIC_MODEL         — e.g. claude-sonnet-4-20250514 (default in script)
#   WEBSITE_URL             — override public base URL for links
#   GEMINI_API_KEY          — free key at aistudio.google.com (takes priority over Anthropic)
#
# Optional repository variables (Settings → Variables):
#   LINKEDIN_SKIP_CONNECTION_TEST — true (required: token lacks r_liteprofile, /v2/me returns 403)
#   LINKEDIN_OPTIONAL      — true to not fail the workflow if LinkedIn post fails (article still publishes)
#
# GITHUB_TOKEN is provided automatically; needs contents: write (see permissions below).
#
# Place at repo root: full_automation_system.py, enhanced_fabric_schedule.json, requirements.txt
# Optional: profile_photo.png (LinkedIn avatar in post images)

name: Fabric 100 Days — daily publish

on:
  schedule:
    - cron: '30 1 * * *'  # 01:30 UTC = 07:00 IST every day
  workflow_dispatch:
    inputs:
      only_day:
        description: 'Force publish a specific day (1-100). Leave blank for normal daily automation.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: fabric-100-days-daily
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Use Node.js 24 for actions/checkout, setup-python, etc. (avoids Node 20 deprecation warnings)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install ffmpeg (for YouTube video generation)
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run daily automation (single cycle)
        env:
          GITHUB_ACTIONS: 'true'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_REPOSITORY is set automatically by Actions (owner/repo)
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          LINKEDIN_USE_REST_POSTS: 'true'
          # Free option: get key at aistudio.google.com — takes priority over Anthropic
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          # Always generate articles and LinkedIn posts via AI
          FABRIC_USE_AI: 'true'
          # Optional: override public article URLs (e.g. project pages site)
          WEBSITE_URL: ${{ secrets.WEBSITE_URL }}
          # Required: token lacks r_liteprofile so /v2/me returns 403 — skip that preflight check
          LINKEDIN_SKIP_CONNECTION_TEST: 'true'
          LINKEDIN_OPTIONAL: ${{ vars.LINKEDIN_OPTIONAL }}
          # YouTube (optional — both must be set to enable uploads)
          YOUTUBE_CLIENT_SECRET_B64: ${{ secrets.YOUTUBE_CLIENT_SECRET_B64 }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.only_day }}" ]; then
            python full_automation_system.py --once --only-day ${{ github.event.inputs.only_day }}
          else
            python full_automation_system.py --once
          fi
